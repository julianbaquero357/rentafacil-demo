<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Verificación - Renta Fácil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #f4f8fb;
            --panel: #ffffff;
            --line: #e2e8f0;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #0b5ed7;
            --primary2: #2563eb;
            --danger: #ef4444;
            --shadow: 0 20px 44px rgba(15,23,42,.08);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(37,99,235,.08), transparent 20%),
                radial-gradient(circle at bottom right, rgba(16,185,129,.07), transparent 20%),
                var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 28px;
            padding: 32px;
            box-shadow: var(--shadow);
            border: 1px solid var(--line);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            margin: 0 0 10px;
            font-size: 22px;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: 1px solid var(--line);
            font-size: 16px;
            margin-bottom: 16px;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 600;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37,99,235,0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: white;
            transition: 0.2s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(37,99,235,0.25);
        }

        .footer {
            margin-top: 18px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }

        .logo {
            text-align: center;
            margin-bottom: 18px;
            font-weight: 800;
            color: var(--primary);
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="card">

        <div class="logo">
            Renta Fácil
        </div>

        <h1>Verificación de identidad</h1>

        <p>
            Se ha enviado un código de verificación al correo registrado.
            Ingréselo para continuar con la consulta.
        </p>

        {% if error %}
        <div class="error">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/verificar">
            <input 
                type="text" 
                name="codigo" 
                placeholder="••••••" 
                maxlength="6"
                required
            >

            <button type="submit">
                Verificar código
            </button>
        </form>

        <div class="footer">
            Sistema de validación segura • Renta Fácil
        </div>

    </div>

</body>
</html>
