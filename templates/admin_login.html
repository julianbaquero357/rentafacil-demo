<!DOCTYPE html>
<html>
<head>
    <title>Acceso Administrativo - Renta Fácil</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #002855, #00509d);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .login-box {
            background: white;
            padding: 40px;
            width: 400px;
            border-radius: 12px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #002855;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #00509d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #003f7f;
        }

        .error {
            color: red;
            text-align: center;
            margin-bottom: 10px;
        }

        .logo {
            text-align: center;
            font-weight: bold;
            font-size: 22px;
            margin-bottom: 10px;
            color: #002855;
        }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">RENTA FÁCIL</div>
    <h2>Panel Administrativo</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuario" required>
        <input type="password" name="password" placeholder="Contraseña" required>
        <button type="submit">Ingresar</button>
    </form>
</div>

</body>
</html>
